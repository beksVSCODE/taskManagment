spring.application.name=dash_bord
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:dash_bord_1}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:${PGUSER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:beka2006}}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:disable}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:dtm_super_secret_key_minimum_32_chars_long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# Voice task feature (audio -> text)
voice.stt.provider=${VOICE_STT_PROVIDER:client}

voice.stt.openai.base-url=${VOICE_STT_OPENAI_BASE_URL:https://api.openai.com/v1}
voice.stt.openai.api-key=${VOICE_STT_OPENAI_API_KEY:}
voice.stt.openai.model=${VOICE_STT_OPENAI_MODEL:whisper-1}

voice.stt.gemini.base-url=${VOICE_STT_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
voice.stt.gemini.api-key=${VOICE_STT_GEMINI_API_KEY:${GEMINI_API_KEY:AIzaSyDwjJ3yIugXVU9sX9gceY2P-1Uc_eLguHc}}
voice.stt.gemini.model=${VOICE_STT_GEMINI_MODEL:gemini-flash-latest}
# Voice task feature (text -> structured draft via LLM)
voice.parse.provider=${VOICE_PARSE_PROVIDER:gemini}

voice.parse.openai.base-url=${VOICE_PARSE_OPENAI_BASE_URL:${VOICE_STT_OPENAI_BASE_URL:https://api.openai.com/v1}}
voice.parse.openai.api-key=${VOICE_PARSE_OPENAI_API_KEY:${VOICE_STT_OPENAI_API_KEY:}}
voice.parse.openai.model=${VOICE_PARSE_OPENAI_MODEL:gpt-4o-mini}

voice.parse.gemini.base-url=${VOICE_PARSE_GEMINI_BASE_URL:${VOICE_STT_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}}
voice.parse.gemini.api-key=${VOICE_PARSE_GEMINI_API_KEY:${GEMINI_API_KEY:AIzaSyDwjJ3yIugXVU9sX9gceY2P-1Uc_eLguHc}}
voice.parse.gemini.model=${VOICE_PARSE_GEMINI_MODEL:gemini-flash-latest}
