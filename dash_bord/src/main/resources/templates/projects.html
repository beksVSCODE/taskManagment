<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>DTM — Проекты</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/projects.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/projects" class="navbar-brand">⬡ DTM</a>
    <div class="navbar-right">
        <!-- Колокольчик -->
        <button class="notif-btn" onclick="toggleNotif()" title="Уведомления">
            🔔
            <span class="notif-badge" th:text="${unreadCount}"
                  th:style="${unreadCount == 0} ? 'display:none' : ''">0</span>
        </button>
        <!-- Аватар -->
        <div class="user-avatar"
             th:text="${#strings.substring(currentUser.fullName, 0, 1)}">U</div>

        <!-- Logout -->
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button class="btn btn-ghost btn-sm" type="submit">Выйти</button>
        </form>
    </div>
</nav>

<!-- Notification Dropdown -->
<div class="notif-dropdown" id="notifDropdown">
    <div class="notif-header">
        <span>Уведомления</span>
        <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Прочитать все</button>
    </div>
    <div id="notifList"><!-- JS --></div>
</div>

<!-- LAYOUT -->
<div class="layout">
    <aside class="sidebar">
        <a href="/projects" class="sidebar-link active">📋 Проекты</a>
        <a href="#" class="sidebar-link">👥 Команда</a>
        <a href="#" class="sidebar-link">📊 Аналитика</a>
    </aside>

    <main class="main-content">
        <div class="header-bar">
            <div>
                <h1 class="page-title">Проекты</h1>
                <p class="page-sub">Все проекты компании</p>
            </div>
            <button class="btn btn-primary" onclick="openCreateProject()"
                    sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                + Новый проект
            </button>
        </div>

        <div class="projects-grid">
            <a th:each="project : ${projects}"
               th:href="@{/projects/{id}/board(id=${project.id})}"
               class="project-card">

                <div class="project-card-header">
                    <div>
                        <p class="project-name" th:text="${project.name}">Название проекта</p>
                        <p class="project-desc" th:text="${project.description}">Описание</p>
                    </div>
                    <div class="project-status-dot"></div>
                </div>

                <div class="project-meta">
                    <!-- Команда (аватары) -->
                    <div class="project-team">
                        <div th:each="member, iter : ${project.members}"
                             th:if="${iter.index < 4}"
                             class="team-avatar"
                             th:text="${#strings.substring(member.user.fullName, 0, 1)}"
                             th:title="${member.user.fullName}">A</div>
                        <div th:if="${#lists.size(project.members) > 4}"
                             class="team-avatar"
                             th:text="${'+' + (#lists.size(project.members) - 4)}">+2</div>
                    </div>
                    <span class="project-tasks-count">ПМ: <span th:text="${project.pm?.fullName ?: '—'}"></span></span>
                </div>

            </a>
        </div>

        <!-- Пусто -->
        <div th:if="${#lists.isEmpty(projects)}"
             style="text-align:center; padding:60px; color:var(--text-dim)">
            <p style="font-size:3rem">📭</p>
            <p>Проектов пока нет</p>
        </div>
    </main>
</div>

<!-- Modal: Создать проект -->
<div class="modal-overlay" id="createProjectModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Новый проект</span>
            <button class="modal-close" onclick="closeModal('createProjectModal')">×</button>
        </div>
        <div class="form-group">
            <label class="form-label">Название *</label>
            <input id="pName" class="form-control" placeholder="Название проекта">
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea id="pDesc" class="form-control" placeholder="Краткое описание"></textarea>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px">
            <button class="btn btn-ghost" onclick="closeModal('createProjectModal')">Отмена</button>
            <button class="btn btn-primary" onclick="createProject()">Создать</button>
        </div>
    </div>
</div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/projects.js}"></script>
</body>
</html>
